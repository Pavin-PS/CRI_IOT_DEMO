<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <link rel="stylesheet" href="style1.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sansation:wght@400;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
  <link rel="shortcut icon" href="assets/images/cri_logo1.png" type="image/x-icon">
</head>
<body style="font-family: Sansation, sans-serif; background-color: #ffffe3;">
  
<header>
  <a href="login.html" style="display: flex; width: 100%; color: white; text-decoration: none; padding: 2%;" class="head-link">
    <img src="assets/images/back.png" alt="back" width="20" height="20"> 
    <span style="padding-left: 2%;">BACK</span>
  </a>
  <a href="dashboard.html" style="display: flex; width: 100%; color: white; text-decoration: none; padding: 2%;" class="head-link">
    <img src="assets/images/home.png" alt="home" width="20" height="20"> 
    <span style="padding-left: 2%;">HOME</span>
  </a>
</header>

<h4>MODE SELECTION</h4>

<div class="container mt-4">
  <div class="d-flex gap-4">
      <div>
        <p>Auto Mode</p>
        <button id="Auto" class="btn square-btn btn-danger" onclick="toggleButton('Auto')">OFF</button>
      </div>
  
    
    
      <!-- <div>
        <p>Manual Mode</p>
        <button id="Manual" class="btn square-btn btn-danger" onclick="toggleButton('Manual')">OFF</button>
      </div>
    </div>
  </div> -->
</div>


  <!-- Manual Mode -->
  <div class="main-mode mb-4">
    <h4>MANUAL MODE</h4>
    <div class="d-flex gap-4 flex-wrap">
      <div>
        <p>PUMP1</p>
        <button id="P1" class="btn square-btn btn-danger" onclick="toggleButton('P1')">OFF</button>
      </div>
      <div>
        <p>PUMP2</p>
        <button id="P2" class="btn square-btn btn-danger" onclick="toggleButton('P2')">OFF</button>
      </div>
      <div>
        <p>PUMP3</p>
        <button id="P3" class="btn square-btn btn-danger" onclick="toggleButton('P3')">OFF</button>
      </div>
      <div>
        <p>PUMP4</p>
        <button id="P4" class="btn square-btn btn-danger" onclick="toggleButton('P4')">OFF</button>
      </div>
    </div>
  </div>

  <!-- Real Time Pump Data -->
  <div class="main-mode1 mb-4">
    <h4>REAL TIME PUMP DATA</h4>
    <div class="d-flex flex-wrap gap-4">
      <div>
        <p>Voltage</p>
        <button id="volt" class="btn btn-primary">00</button>
      </div>
      <div>
        <p>Current</p>
        <button id="Current" class="btn btn-primary">00</button>
      </div>
      <div>
        <p>Frequency</p>
        <button id="frequency" class="btn btn-primary">00</button>
      </div>
      <div>
        <p>Actual Pressure</p>
        <button id="Apress" class="btn btn-primary">00</button>
      </div>
      <div>
        <p>Hum</p>
        <input id="Hum" class="form-control" style="width:80px;">
      </div>
    </div>
    <button class="btn btn-secondary mt-3" onclick="writeData()">Submit</button>
  </div>
</div>

<!-- Firebase scripts -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
  // Firebase config
  const firebaseConfig = {
    apiKey: "AIzaSyDJDonRsKii93yh7H3U122jMzDQzJgxHnc",
    authDomain: "demoapp-726c3.firebaseapp.com",
    databaseURL: "https://demoapp-726c3-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "demoapp-726c3",
    storageBucket: "demoapp-726c3.appspot.com",
    messagingSenderId: "14564664223",
    appId: "1:14564664223:web:7350a1df1557c54c4cd3aa"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  const userId = "25";
  const buttons = ["Auto", "Manual", "P1", "P2", "P3", "P4"];

  // Attach Firebase listeners for each button
  buttons.forEach(id => {
    const ref = db.ref(`users/${userId}/${id}`);
    ref.on("value", snapshot => {
      updateButtonUI(id, snapshot.val());
    });
  });

  // Toggle button state
  function toggleButton(id) {
    const btn = document.getElementById(id);
    const currentState = btn.classList.contains("btn-success");

    if (id === "Auto" && !currentState) {
      // turn Auto ON and Manual OFF
      db.ref(`users/${userId}/Auto`).set(true);
      db.ref(`users/${userId}/Manual`).set(false);
    } else if (id === "Manual" && !currentState) {
      // turn Manual ON and Auto OFF
      db.ref(`users/${userId}/Manual`).set(true);
      db.ref(`users/${userId}/Auto`).set(false);
    } else {
      // normal toggle for pumps or turning modes off
      db.ref(`users/${userId}/${id}`).set(!currentState);
    }
  }

  // Update button UI
  function updateButtonUI(id, state) {
    const btn = document.getElementById(id);
    if (!btn) return;
    if (state) {
      btn.classList.remove("btn-danger");
      btn.classList.add("btn-success");
      btn.textContent = "ON";
    } else {
      btn.classList.remove("btn-success");
      btn.classList.add("btn-danger");
      btn.textContent = "OFF";
    }
  }

  // Write extra data
  function writeData() {
    const humVal = document.getElementById("Hum").value;
    db.ref(`users/${userId}`).update({ humidity: humVal });
  }

  // Listen to sensor values
  db.ref(`users/${userId}/humidity`).on("value", snap => {
    document.getElementById("volt").textContent = snap.val();
  });
  db.ref(`users/${userId}/temperature`).on("value", snap => {
    document.getElementById("Current").textContent = snap.val();
  });
</script>

</body>
</html>
