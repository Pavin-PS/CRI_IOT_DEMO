<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyDJDonRsKii93yh7H3U122jMzDQzJgxHnc",
  authDomain: "demoapp-726c3.firebaseapp.com",
  databaseURL: "https://demoapp-726c3-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "demoapp-726c3",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let currentUserId = null;
const buttons = ["Auto", "Manual", "P1", "P2", "P3", "P4"];
let activeRefs = [];



db.ref("users").on("value", (snapshot) => {
    const container = document.getElementById("userList");
    let html = "";

    snapshot.forEach((child) => {
        const id = child.key;

        html += `
            <a href="#" data-id="${id}" 
               style="display:block; padding:10px; border-bottom:1px solid #ccc; text-decoration:none; color:black;">
               ${id}
            </a>
        `;
    });

    container.innerHTML = html;

   
    document.querySelectorAll("#userList a").forEach((el) => {
        el.addEventListener("click", function (e) {
            e.preventDefault();
            const id = this.getAttribute("data-id");
            selectUser(id, this);
        });
    });
});


// 🔹 SELECT USER
function selectUser(userId, element) {
    currentUserId = userId;

    document.getElementById("selectedUser").innerText =
        "Selected User: " + userId;

    // highlight
    document.querySelectorAll("#userList a").forEach(a => {
        a.style.background = "";
    });
    element.style.background = "#ddd";

    loadUserData(); // 🔥 load data
}

function filterUsers() {
    const input = document.getElementById("searchBox").value.toLowerCase();
    const users = document.querySelectorAll("#userList a");

    users.forEach(user => {
        const text = user.textContent.toLowerCase();
        user.style.display = text.includes(input) ? "block" : "none";
    });
}

// 🔹 LOAD USER DATA (REALTIME SYNC)
function loadUserData() {

    // remove old listeners
    activeRefs.forEach(ref => ref.off());
    activeRefs = [];

    
    buttons.forEach(id => {
        const ref = db.ref(`users/${currentUserId}/${id}`);

        ref.on("value", snapshot => {
            console.log(id, snapshot.val());
            updateButtonUI(id, snapshot.val());
        });

        activeRefs.push(ref);
    });


    const humRef = db.ref(`users/${currentUserId}/VOLTAGE`);
    humRef.on("value", snap => {
        document.getElementById("volt").textContent = snap.val();
    });
    activeRefs.push(humRef);

    const tempRef = db.ref(`users/${currentUserId}/CURRENT`);
    tempRef.on("value", snap => {
        document.getElementById("Current").textContent = snap.val();
    });
    activeRefs.push(tempRef);
}


// 🔹 TOGGLE BUTTON (FIXED FOR CHECKBOX)
function toggleButton(id) {
    if (!currentUserId) {
        alert("Select user first!");
        return;
    }

    const ref = db.ref(`users/${currentUserId}/${id}`);

    // 🔥 ALWAYS read DB first (important)
    ref.once("value").then(snapshot => {

        const currentState = (snapshot.val() === true || snapshot.val() === "true");

        if (id === "Auto" && !currentState) {
            db.ref(`users/${currentUserId}/Auto`).set(true);
            db.ref(`users/${currentUserId}/Manual`).set(false);
        } 
        else if (id === "Manual" && !currentState) {
            db.ref(`users/${currentUserId}/Manual`).set(true);
            db.ref(`users/${currentUserId}/Auto`).set(false);
        } 
        else {
            ref.set(!currentState);
        }
    });
}


// 🔹 UPDATE UI (FOR CHECKBOX TOGGLE)
function updateButtonUI(id, state) {
    const toggle = document.getElementById(id);
    if (!toggle) return;

    // 🔥 handle boolean + string
    const value = (state === true || state === "true");

    // ✅ update checkbox state
    toggle.checked = value;
}


// 🔹 WRITE DATA
function writeData() {
    if (!currentUserId) return;

    const humVal = document.getElementById("Hum").value;

    db.ref(`users/${currentUserId}`).update({
        humidity: humVal
    });
}

</script>
