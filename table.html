      // Toggle the visibility of a dropdown menu
const toggleDropdown = (dropdown, menu, isOpen) => {
  dropdown.classList.toggle("open", isOpen);
  menu.style.height = isOpen ? `${menu.scrollHeight}px` : 0;
};
// Close all open dropdowns
const closeAllDropdowns = () => {
  document.querySelectorAll(".dropdown-container.open").forEach((openDropdown) => {
    toggleDropdown(openDropdown, openDropdown.querySelector(".dropdown-menu"), false);
  });
};
// Attach click event to all dropdown toggles
document.querySelectorAll(".dropdown-toggle").forEach((dropdownToggle) => {
  dropdownToggle.addEventListener("click", (e) => {
    e.preventDefault();
    const dropdown = dropdownToggle.closest(".dropdown-container");
    const menu = dropdown.querySelector(".dropdown-menu");
    const isOpen = dropdown.classList.contains("open");
    closeAllDropdowns(); // Close all open dropdowns
    toggleDropdown(dropdown, menu, !isOpen); // Toggle current dropdown visibility
  });
});
// Attach click event to sidebar toggle buttons
document.querySelectorAll(".sidebar-toggler, .sidebar-menu-button").forEach((button) => {
  button.addEventListener("click", () => {
    closeAllDropdowns(); // Close all open dropdowns
    document.querySelector(".sidebar").classList.toggle("collapsed"); // Toggle collapsed class on sidebar
  });
});
// Collapse sidebar by default on small screens
if (window.innerWidth <= 1024) document.querySelector(".sidebar").classList.add("collapsed");

function filterUsers(inputId, listId) {

        user.style.display = text.includes(input) ? "block" : "none";

// 🔹 LOAD USER DATA (REALTIME SYNC)
function loadUserData() {

            updateButtonUI(id, snapshot.val());
        });

    });


    const humRef = db.ref(`users/${currentUserId}/VOLTAGE`);
    humRef.on("value", snap => {
        document.getElementById("volt").textContent = snap.val();
    });
    activeRefs.push(humRef);

    const tempRef = db.ref(`users/${currentUserId}/CURRENT`);
    tempRef.on("value", snap => {
        document.getElementById("Current").textContent = snap.val();
    });
    activeRefs.push(tempRef);
}


// 🔹 TOGGLE BUTTON (FIXED FOR CHECKBOX)
function toggleButton(id) {
    if (!currentUserId) {
        alert("Select user first!");
        return;
    }

    const ref = db.ref(`users/${currentUserId}/${id}`);

    // 🔥 ALWAYS read DB first (important)
    ref.once("value").then(snapshot => {

        const currentState = (snapshot.val() === true || snapshot.val() === "true");

        if (id === "Auto" && !currentState) {
            db.ref(`users/${currentUserId}/Auto`).set(true);
            db.ref(`users/${currentUserId}/Manual`).set(false);
        } 
        else if (id === "Manual" && !currentState) {
            db.ref(`users/${currentUserId}/Manual`).set(true);
            db.ref(`users/${currentUserId}/Auto`).set(false);
        } 
        else {
            ref.set(!currentState);
        }
    });
}


// 🔹 UPDATE UI (FOR CHECKBOX TOGGLE)
function updateButtonUI(id, state) {
    const toggle = document.getElementById(id);
    if (!toggle) return;

    // 🔥 handle boolean + string
    const value = (state === true || state === "true");

    // ✅ update checkbox state
    toggle.checked = value;
}

const URL = "https://eu-central-1-1.aws.cloud2.influxdata.com/api/v2/query?org=CRI";
const TOKEN = "yP5Ax_JSfF9ihqhgBvKJ8lclXtTJrzdeGc6EZOWCQfhRlOXLfXvefZQR-WJCIcsPcmsYOEbH8HjprhZHrd5Qmg==";
const BUCKET = "DEMO_IOT";

// ===== FETCH DATA =====
async function loadData() {

  const range = document.getElementById("range").value;

  const query = `
from(bucket: "${BUCKET}")
  |> range(start: -${range})
  |> filter(fn: (r) => r._measurement == "iot_data")
  |> pivot(rowKey:["_time"], columnKey: ["_field"], valueColumn: "_value")
  |> sort(columns: ["_time"], desc: true)
  |> limit(n: 50)
`;

  try {

    const res = await fetch(URL, {
      method: "POST",
      headers: {
        "Authorization": "Token " + TOKEN,
        "Content-Type": "application/vnd.flux",
        "Accept": "application/csv"
      },
      body: query
    });

    const text = await res.text();
    console.log(text);

    parseCSV(text);

  } catch (err) {
    console.error(err);
    alert("Fetch failed");
  }
}

// ===== PARSE CSV =====
function parseCSV(csv) {

  const lines = csv.split("\n");

  let headers = [];
  let dataRows = [];

  lines.forEach(line => {

    if (!line || line.startsWith("#")) return;

    const cols = line.split(",");

    // First valid row = headers
    if (headers.length === 0) {
      headers = cols;
      return;
    }

    let row = {};

    headers.forEach((h, i) => {
      row[h] = cols[i];
    });

    dataRows.push(row);
  });

  buildTable(dataRows);
}

// ===== BUILD TABLE =====
function buildTable(data) {

  const tableHead = document.getElementById("tableHead");
  const tableBody = document.getElementById("tableBody");

  tableHead.innerHTML = "";
  tableBody.innerHTML = "";

  if (data.length === 0) return;

  // Get all fields dynamically
  let columns = Object.keys(data[0]);

  // ===== HEADER =====
  let headerRow = "<tr>";
  columns.forEach(col => {
    headerRow += `<th>${col}</th>`;
  });
  headerRow += "</tr>";
  tableHead.innerHTML = headerRow;

  // ===== ROWS =====
  data.forEach(row => {

    let rowHtml = "<tr>";

    columns.forEach(col => {
      rowHtml += `<td>${row[col] || ""}</td>`;
    });

    rowHtml += "</tr>";

    tableBody.innerHTML += rowHtml;
  });
}
